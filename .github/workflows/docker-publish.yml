name: Publish Docker Image

on:
  push:
    branches:
      - main
      - Preview
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: qunqin45/prism

jobs:
  publish:
    name: Build and publish linux/amd64 image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check Docker Hub token
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "::error title=Missing Docker Hub token::Set the DOCKERHUB_TOKEN repository secret before publishing qunqin45/prism images."
            exit 1
          fi

      - name: Resolve Docker tags
        id: meta
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          case "${REF_TYPE}:${REF_NAME}" in
            branch:main)
              echo "tags=${IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"
              ;;
            branch:Preview)
              echo "tags=${IMAGE_NAME}:preview" >> "$GITHUB_OUTPUT"
              ;;
            tag:v*)
              echo "tags=${IMAGE_NAME}:${REF_NAME}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error title=Unsupported ref::No Docker tag rule for ${REF_TYPE}:${REF_NAME}."
              exit 1
              ;;
          esac

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: qunqin45
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
